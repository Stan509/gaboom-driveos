<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% trans "Hors ligne" %} — Gaboom DriveOS</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,system-ui,sans-serif;background:#0F0F0F;color:#F0F0F0;
      display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
    .wrap{max-width:400px}
    .icon{width:64px;height:64px;margin:0 auto 24px;opacity:.4}
    h1{font-size:24px;font-weight:700;margin-bottom:8px}
    p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:24px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:14px;
      font-size:14px;font-weight:600;background:#6C2BFF;color:#fff;border:none;cursor:pointer;
      text-decoration:none;transition:transform .15s,box-shadow .15s}
    .btn:hover{transform:scale(1.03);box-shadow:0 0 24px rgba(108,43,255,.25)}
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"/>
    </svg>
    <h1>{% trans "Vous etes hors ligne" %}</h1>
    <p>{% trans "Verifiez votre connexion internet puis reessayez. Gaboom DriveOS sera de retour des que vous serez reconnecte." %}</p>
    <button class="btn" onclick="location.reload()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
      {% trans "Reessayer" %}
    </button>
  </div>
</body>
</html>
