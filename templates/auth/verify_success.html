{% extends "base.html" %}
{% load static %}

{% block title %}Email vérifié — Gaboom DriveOS{% endblock %}

{% block body %}
  <div class="min-h-screen flex items-center justify-center px-4 bg-slate-50">
    <div class="w-full max-w-md text-center">
      <a href="/"><img src="{% static 'brand/logo.png' %}" alt="Gaboom DriveOS" class="h-9 mx-auto" /></a>

      <div class="mt-8 rounded-2xl bg-white border border-slate-200 shadow-sm p-8">
        <div class="mx-auto h-14 w-14 rounded-full bg-emerald-50 flex items-center justify-center">
          <svg class="w-7 h-7 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        </div>

        <h1 class="mt-5 text-xl font-bold text-slate-900">Email vérifié !</h1>
        <p class="mt-2 text-sm text-slate-500">Ton compte et ton agence sont maintenant actifs.</p>

        <a href="/dashboard/" class="mt-6 inline-flex w-full items-center justify-center rounded-full bg-gaboomViolet text-white py-2.5 text-sm font-semibold shadow-lg shadow-violet-200 hover:bg-violet-700 transition-all">
          Accéder au dashboard
        </a>
      </div>
    </div>
  </div>
{% endblock %}
