{% extends "public_site/_base.html" %}
{% load i18n %}

{% block ps_content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="ps-card rounded-2xl border p-8 space-y-6" style="border-color: color-mix(in srgb, var(--text) 10%, transparent);">
      <div class="text-center">
        <h1 class="text-xl font-bold">Connexion client</h1>
        <p class="text-sm opacity-60 mt-1">Accédez à votre espace chez {{ agency.name }}</p>
      </div>

      {% if error %}
      <div class="rounded-xl bg-red-50 border border-red-200 p-3 text-sm text-red-700 flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if request.GET.next %}<input type="hidden" name="next" value="{{ request.GET.next }}" />{% endif %}
        <div>
          <label class="block text-xs font-semibold opacity-50 uppercase tracking-wider mb-1">Email</label>
          <input type="email" name="email" required value="{{ form_data.email|default:'' }}"
                 class="w-full rounded-xl border px-4 py-2.5 text-sm outline-none focus:ring-2"
                 style="border-color: color-mix(in srgb, var(--text) 15%, transparent); --tw-ring-color: var(--primary);" />
        </div>
        <div>
          <label class="block text-xs font-semibold opacity-50 uppercase tracking-wider mb-1">Mot de passe</label>
          <input type="password" name="password" required
                 class="w-full rounded-xl border px-4 py-2.5 text-sm outline-none focus:ring-2"
                 style="border-color: color-mix(in srgb, var(--text) 15%, transparent); --tw-ring-color: var(--primary);" />
        </div>
        <button type="submit" class="ps-btn w-full !rounded-xl !py-2.5">Se connecter</button>
      </form>

      <p class="text-center text-sm opacity-60">
        Pas encore de compte ?
        <a href="{% url 'public_site:client_signup' slug=agency.slug %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}" class="ps-primary font-semibold hover:underline">Créer un compte</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
