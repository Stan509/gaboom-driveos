[mypy]
python_version = 3.10
plugins = mypy_django_plugin.main
ignore_missing_imports = True
warn_unused_ignores = True
show_error_codes = True
check_untyped_defs = False
disable_error_code = import-untyped
exclude = (dashboard/|config/urls.py|core/admin.py|agencies/paypal_webhooks.py|core/migrations/)

[mypy.plugins.django-stubs]
django_settings_module = config.settings

[mypy-core.models]
ignore_errors = True

[mypy-core.views]
ignore_errors = True

[mypy-core.services_paypal_api]
ignore_errors = True

[mypy-public_site.*]
ignore_errors = True

[mypy-superadmin.views]
ignore_errors = True

[mypy-clients.views_portal]
ignore_errors = True

[mypy-config.settings]
ignore_errors = True
